<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef7ed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e8d1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wheatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b8860b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b4513;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="honeyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Decorative wheat elements -->
  <g transform="translate(50, 100)">
    <!-- Left wheat -->
    <path d="M50 400 L50 200" stroke="url(#wheatGradient)" stroke-width="4" fill="none"/>
    <ellipse cx="47" cy="210" rx="6" ry="12" fill="url(#wheatGradient)" transform="rotate(-15 47 210)"/>
    <ellipse cx="53" cy="210" rx="6" ry="12" fill="url(#wheatGradient)" transform="rotate(15 53 210)"/>
    <ellipse cx="45" cy="230" rx="6" ry="12" fill="url(#wheatGradient)" transform="rotate(-20 45 230)"/>
    <ellipse cx="55" cy="230" rx="6" ry="12" fill="url(#wheatGradient)" transform="rotate(20 55 230)"/>
    <ellipse cx="43" cy="250" rx="6" ry="12" fill="url(#wheatGradient)" transform="rotate(-25 43 250)"/>
    <ellipse cx="57" cy="250" rx="6" ry="12" fill="url(#wheatGradient)" transform="rotate(25 57 250)"/>
  </g>
  
  <g transform="translate(1050, 100)">
    <!-- Right wheat -->
    <path d="M50 400 L50 200" stroke="url(#wheatGradient)" stroke-width="4" fill="none"/>
    <ellipse cx="47" cy="210" rx="6" ry="12" fill="url(#wheatGradient)" transform="rotate(-15 47 210)"/>
    <ellipse cx="53" cy="210" rx="6" ry="12" fill="url(#wheatGradient)" transform="rotate(15 53 210)"/>
    <ellipse cx="45" cy="230" rx="6" ry="12" fill="url(#wheatGradient)" transform="rotate(-20 45 230)"/>
    <ellipse cx="55" cy="230" rx="6" ry="12" fill="url(#wheatGradient)" transform="rotate(20 55 230)"/>
    <ellipse cx="43" cy="250" rx="6" ry="12" fill="url(#wheatGradient)" transform="rotate(-25 43 250)"/>
    <ellipse cx="57" cy="250" rx="6" ry="12" fill="url(#wheatGradient)" transform="rotate(25 57 250)"/>
  </g>
  
  <!-- Main content -->
  <g transform="translate(600, 315)">
    <!-- Central wheat logo -->
    <g transform="translate(-40, -80)">
      <path d="M40 60 L40 20" stroke="url(#wheatGradient)" stroke-width="3" fill="none"/>
      <ellipse cx="37" cy="22" rx="4" ry="8" fill="url(#wheatGradient)" transform="rotate(-15 37 22)"/>
      <ellipse cx="43" cy="22" rx="4" ry="8" fill="url(#wheatGradient)" transform="rotate(15 43 22)"/>
      <ellipse cx="35" cy="28" rx="4" ry="8" fill="url(#wheatGradient)" transform="rotate(-20 35 28)"/>
      <ellipse cx="45" cy="28" rx="4" ry="8" fill="url(#wheatGradient)" transform="rotate(20 45 28)"/>
      <ellipse cx="33" cy="34" rx="4" ry="8" fill="url(#wheatGradient)" transform="rotate(-25 33 34)"/>
      <ellipse cx="47" cy="34" rx="4" ry="8" fill="url(#wheatGradient)" transform="rotate(25 47 34)"/>
    </g>
    
    <!-- Brand name -->
    <text x="0" y="-30" text-anchor="middle" font-family="serif" font-size="68" font-weight="bold" fill="#8b4513">Jenyrenfoods</text>
    
    <!-- Tagline -->
    <text x="0" y="20" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#b8860b">Premium African Food Products</text>
    
    <!-- Description -->
    <text x="0" y="60" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#8b4513">Authentic ChinChin, Plantain Flour &amp; More</text>
    <text x="0" y="90" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#b8860b">100% Natural • Traditional Methods • Premium Quality</text>
  </g>
  
  <!-- Decorative honey drops -->
  <circle cx="200" cy="150" r="8" fill="url(#honeyGradient)" opacity="0.6"/>
  <circle cx="1000" cy="500" r="10" fill="url(#honeyGradient)" opacity="0.6"/>
  <circle cx="300" cy="480" r="6" fill="url(#honeyGradient)" opacity="0.6"/>
  <circle cx="900" cy="180" r="7" fill="url(#honeyGradient)" opacity="0.6"/>
</svg>
