  <ellipse cx="17" cy="11" rx="1.5" ry="3" fill="url(#wheatGradient)" transform="rotate(15 17 11)"/>
  
  <ellipse cx="14.5" cy="13" rx="1.5" ry="3" fill="url(#wheatGradient)" transform="rotate(-20 14.5 13)"/>
